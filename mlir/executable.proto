syntax = "proto3";

package tt;

option optimize_for = LITE_RUNTIME;

message TensorDesc {
  enum ElementType {
    ELEMENT_TYPE_UNKNOWN = 0;
    ELEMENT_TYPE_BF16 = 1;
    ELEMENT_TYPE_F16 = 2;
    ELEMENT_TYPE_F32 = 3;
    ELEMENT_TYPE_U32 = 4;
    ELEMENT_TYPE_U16 = 5;
    ELEMENT_TYPE_U8 = 6;
    ELEMENT_TYPE_S32 = 7;
    ELEMENT_TYPE_S8 = 8;
    ELEMENT_TYPE_PRED = 9;
  }

  repeated int64 dims = 1;
  ElementType element_type = 2;
}

message ValueDesc {
  TensorDesc tensor = 1;
}

message ParameterOp {
  // Zero-based entry-function argument index bound to Op.output_id.
  uint32 parameter_index = 1;
}

message ConcatenateOp {
  // Indices into Executable.values for this op's operands.
  repeated uint32 input_ids = 1;
  uint64 dimension = 2;
}

message ReshapeOp {
  // Index into Executable.values for this op's operand.
  uint32 operand_id = 1;
}

message SliceOp {
  // Index into Executable.values for this op's operand.
  uint32 operand_id = 1;
  repeated int64 start_indices = 2;
  repeated int64 limit_indices = 3;
  repeated int64 strides = 4;
}

message TransposeOp {
  // Index into Executable.values for this op's operand.
  uint32 operand_id = 1;
  repeated int64 permutation = 2;
}

message CustomCallOp {
  // Indices into Executable.values for this op's operands.
  repeated uint32 input_ids = 1;
  string call_target_name = 2;
  bool has_side_effect = 3;
}

message ReduceOp {
  enum Reducer {
    REDUCER_ADD = 0;
    REDUCER_MAX = 1;
    REDUCER_MUL = 2;
    REDUCER_MIN = 3;
    REDUCER_AND = 4;
    REDUCER_OR = 5;
  }

  // Indices into Executable.values for this op's operands.
  repeated uint32 input_ids = 1;
  repeated uint32 init_value_ids = 2;
  repeated int64 dimensions = 3;
  Reducer reducer = 4;
}

message ReduceWindowOp {
  // Indices into Executable.values for this op's operands.
  repeated uint32 input_ids = 1;
  repeated uint32 init_value_ids = 2;

  repeated int64 window_dimensions = 3;
  repeated int64 window_strides = 4;
  repeated int64 base_dilations = 5;
  repeated int64 window_dilations = 6;
  repeated int64 padding_low = 7;
  repeated int64 padding_high = 8;
  ReduceOp.Reducer reducer = 9;
}

message MatmulOp {
  // Indices into Executable.values for this op's operands.
  uint32 lhs_id = 1;
  uint32 rhs_id = 2;
  repeated int64 lhs_batching_dimensions = 3;
  repeated int64 rhs_batching_dimensions = 4;
  repeated int64 lhs_contracting_dimensions = 5;
  repeated int64 rhs_contracting_dimensions = 6;
  MatmulTopKEpilogue top_k_epilogue = 7;
}

message MatmulTopKEpilogue {
  // Logical full matmul result. This value is not materialized when the
  // epilogue is present, but its shape is needed to lower dot_general.
  uint32 matmul_output_id = 1;
  uint32 indices_id = 2;
  uint32 k = 3;
}

message ConstantOp {
  // Splat scalar packed according to Op.output_id's logical element type.
  // 16-bit values are duplicated into both u32 halfwords; 32-bit and narrower
  // integer/predicate values use their raw low bits.
  uint32 packed_value = 1;
  // Logical, row-major constant payload. Empty means use packed_value as a splat.
  bytes data = 2;
}

message SelectOp {
  // Indices into Executable.values for this op's operands.
  uint32 pred_id = 1;
  uint32 on_true_id = 2;
  uint32 on_false_id = 3;
}

message BroadcastInDimOp {
  // Index into Executable.values for this op's operand.
  uint32 operand_id = 1;
  repeated int64 broadcast_dimensions = 2;
}

message GatherOp {
  // Indices into Executable.values for this op's operands.
  uint32 operand_id = 1;
  uint32 start_indices_id = 2;

  repeated int64 offset_dims = 3;
  repeated int64 collapsed_slice_dims = 4;
  repeated int64 operand_batching_dims = 5;
  repeated int64 start_indices_batching_dims = 6;
  repeated int64 start_index_map = 7;
  int64 index_vector_dim = 8;
  repeated int64 slice_sizes = 9;
  bool indices_are_sorted = 10;
}

message ScatterOp {
  // Indices into Executable.values for this op's operands.
  uint32 operand_id = 1;
  uint32 start_indices_id = 2;
  uint32 updates_id = 3;

  repeated int64 update_window_dims = 4;
  repeated int64 inserted_window_dims = 5;
  repeated int64 input_batching_dims = 6;
  repeated int64 scatter_indices_batching_dims = 7;
  repeated int64 scatter_dims_to_operand_dims = 8;
  int64 index_vector_dim = 9;
  bool indices_are_sorted = 10;
  bool unique_indices = 11;
}

message IotaOp {
  uint64 iota_dimension = 1;
}

message TopKOp {
  // Op.output_id is the values result. indices_id is the integer index result.
  uint32 operand_id = 1;
  uint32 indices_id = 2;
  uint32 k = 3;
}

message FusedElementwiseOp {
  message Node {
    enum Kind {
      KIND_INPUT = 0;
      KIND_CONSTANT = 1;
      KIND_ADD = 2;
      KIND_SUBTRACT = 3;
      KIND_MULTIPLY = 4;
      KIND_DIVIDE = 5;
      KIND_MAX = 6;
      KIND_NEGATE = 7;
      KIND_EXPONENTIAL = 8;
      KIND_RSQRT = 9;
      KIND_POWER = 10;
      KIND_COMPARE = 11;
      KIND_COSINE = 12;
      KIND_SINE = 13;
      KIND_CONVERT = 14;
      KIND_LOG = 15;
    }

    enum CompareDirection {
      DIRECTION_EQ = 0;
      DIRECTION_NE = 1;
      DIRECTION_GE = 2;
      DIRECTION_GT = 3;
      DIRECTION_LE = 4;
      DIRECTION_LT = 5;
    }

    Kind kind = 1;
    repeated uint32 input_nodes = 2;
    uint32 input_index = 3;
    uint32 packed_value = 4;
    TensorDesc.ElementType element_type = 5;
    bool single_tile_broadcast = 6;
    CompareDirection compare_direction = 7;
  }

  repeated uint32 input_ids = 1;
  repeated Node nodes = 2;
}

message BitwiseBinaryOp {
  enum Kind {
    KIND_AND = 0;
    KIND_OR = 1;
    KIND_XOR = 2;
    KIND_SHIFT_LEFT = 3;
    KIND_SHIFT_RIGHT_LOGICAL = 4;
    KIND_SHIFT_RIGHT_ARITHMETIC = 5;
  }

  uint32 lhs_id = 1;
  uint32 rhs_id = 2;
  Kind kind = 3;
}

message SdpaDecodeOp {
  // Query, key cache, value cache, sequence lengths, and cache-location vector.
  // The first supported lowering is decode-only BF16 attention with shapes:
  // q=[1, q_heads, head_dim], k/v=[cache_tokens, kv_heads, head_dim],
  // seq_lens=[1], loc=[key_tokens].
  // If fused_kv_cache is true, k_id is a fused KV cache shaped
  // [pages, page_size, kv_heads, 2, head_dim] and v_id is unused.
  uint32 q_id = 1;
  uint32 k_id = 2;
  uint32 v_id = 3;
  uint32 seq_lens_id = 4;
  uint32 loc_id = 5;
  uint32 scale_bf16_packed = 6;
  bool fused_kv_cache = 7;
}

message RmsNormOp {
  uint32 input_id = 1;
  uint32 weight_id = 2;
  uint32 scale_bits = 3;
  uint32 bias_bits = 4;
}

message RopeOp {
  uint32 input_id = 1;
  uint32 cos_id = 2;
  uint32 sin_id = 3;
}

message Op {
  // Index into Executable.values for the value produced by this op.
  uint32 output_id = 1;

  oneof kind {
    ParameterOp parameter = 2;
    MatmulOp matmul = 4;
    ConstantOp constant = 6;
    SelectOp select = 8;
    BroadcastInDimOp broadcast_in_dim = 9;
    GatherOp gather = 10;
    IotaOp iota = 11;
    ConcatenateOp concatenate = 15;
    ReduceOp reduce = 19;
    ReshapeOp reshape = 21;
    SliceOp slice = 22;
    TransposeOp transpose = 26;
    CustomCallOp custom_call = 27;
    TopKOp top_k = 29;
    FusedElementwiseOp fused_elementwise = 30;
    ScatterOp scatter = 32;
    BitwiseBinaryOp bitwise_binary = 33;
    ReduceWindowOp reduce_window = 34;
    SdpaDecodeOp sdpa_decode = 35;
    RmsNormOp rms_norm = 36;
    RopeOp rope = 37;
  }
}

message Executable {
  repeated ValueDesc values = 1;
  repeated Op ops = 2;
  // Indices into values for the program results, in entry-function result
  // order.
  repeated uint32 output_ids = 3;
}

message AnalysisResult {
  enum Status {
    STATUS_UNKNOWN = 0;
    STATUS_OK = 1;
    STATUS_PARSE_ERROR = 2;
    STATUS_UNSUPPORTED = 3;
    STATUS_INTERNAL_ERROR = 4;
  }

  Status status = 1;
  string error_message = 2;

  // Entry-function argument/result metadata, in signature order.
  repeated TensorDesc inputs = 3;
  repeated TensorDesc outputs = 4;

  // Lowered executable payload. Present when status == STATUS_OK.
  Executable executable = 5;
}
