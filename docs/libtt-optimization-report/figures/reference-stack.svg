<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="680" viewBox="0 0 1080 680">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#444444"/>
    </marker>
  </defs>
  <style>
    text{font-family:Helvetica,Arial,sans-serif;fill:#111111}
    .title{font-size:22px;font-weight:700}
    .name{font-size:16px;font-weight:700}
    .body{font-size:12.5px;fill:#333333}
    .small{font-size:11.5px;fill:#444444}
    .band{font-size:12px;font-weight:700;letter-spacing:.8px;fill:#222222}
    .box{fill:#f7f7f7;stroke:#666666;stroke-width:1.3}
    .model{fill:#e7e7e7;stroke:#333333;stroke-width:1.8}
    .device{fill:#dddddd;stroke:#555555;stroke-width:1.4}
    .arrow{stroke:#444444;stroke-width:2;marker-end:url(#arrow)}
  </style>

  <rect width="1080" height="680" fill="#ffffff"/>
  <text x="40" y="32" class="title">Reference TTIS path and its explicit integration layers</text>

  <text x="40" y="65" class="band">SERVING AND ENGINE</text>
  <rect x="40" y="78" width="1000" height="64" rx="8" class="box"/>
  <text x="540" y="104" text-anchor="middle" class="name">tt-inference-server · OpenAI service · model and image selection</text>
  <text x="540" y="126" text-anchor="middle" class="body">pins the serving artifact, TT-Metal revision, and Tenstorrent vLLM implementation</text>

  <line x1="540" y1="142" x2="540" y2="166" class="arrow"/>
  <rect x="40" y="174" width="1000" height="82" rx="8" class="box"/>
  <text x="540" y="201" text-anchor="middle" class="name">vLLM + Tenstorrent platform backend / plugin</text>
  <text x="540" y="224" text-anchor="middle" class="body">scheduler · platform configuration · model registry · loader · worker · model runner · engine</text>
  <text x="540" y="244" text-anchor="middle" class="small">prepares fixed-shape inputs, owns KV-cache integration, and calls the TT model interface</text>

  <text x="40" y="287" class="band">MODEL-SPECIFIC PORT</text>
  <line x1="540" y1="256" x2="540" y2="296" class="arrow"/>
  <rect x="40" y="304" width="1000" height="164" rx="10" class="model"/>
  <text x="540" y="331" text-anchor="middle" class="name">TT-Transformers model and vLLM generator</text>
  <text x="540" y="353" text-anchor="middle" class="body">attention and MLP structure · paged KV cache · prefill/decode modes · layouts · sharding · trace shapes</text>

  <rect x="72" y="375" width="410" height="70" rx="7" class="box"/>
  <text x="277" y="401" text-anchor="middle" class="name">PyTorch host tensors and utilities</text>
  <text x="277" y="424" text-anchor="middle" class="small">weights · tokens · padding · positions · host output</text>

  <rect x="598" y="375" width="410" height="70" rx="7" class="box"/>
  <text x="803" y="401" text-anchor="middle" class="name">TTNN tensors and device operations</text>
  <text x="803" y="424" text-anchor="middle" class="small">matmul · normalization · paged attention · collectives · trace</text>

  <line x1="482" y1="402" x2="590" y2="402" class="arrow"/>
  <text x="536" y="393" text-anchor="middle" class="small">from_torch</text>
  <line x1="598" y1="428" x2="490" y2="428" class="arrow"/>
  <text x="544" y="445" text-anchor="middle" class="small">to_torch</text>

  <text x="40" y="500" class="band">RUNTIME, KERNELS, AND HARDWARE</text>
  <path d="M540 468 L540 482 L320 482 L320 508" fill="none" class="arrow"/>
  <rect x="40" y="516" width="310" height="66" rx="8" class="box"/>
  <text x="195" y="543" text-anchor="middle" class="name">TTNN operator library</text>
  <text x="195" y="565" text-anchor="middle" class="small">tensor API · op selection · program factories</text>

  <line x1="350" y1="549" x2="380" y2="549" class="arrow"/>
  <rect x="388" y="516" width="310" height="66" rx="8" class="box"/>
  <text x="543" y="543" text-anchor="middle" class="name">TT-Metalium</text>
  <text x="543" y="565" text-anchor="middle" class="small">runtime · command queues · reader/compute/writer kernels</text>

  <line x1="698" y1="549" x2="728" y2="549" class="arrow"/>
  <rect x="736" y="516" width="304" height="66" rx="8" class="box"/>
  <text x="888" y="543" text-anchor="middle" class="name">TT-UMD and firmware</text>
  <text x="888" y="565" text-anchor="middle" class="small">device discovery · PCIe · memory and command transport</text>

  <line x1="888" y1="582" x2="888" y2="606" class="arrow"/>
  <rect x="40" y="614" width="1000" height="48" rx="8" class="device"/>
  <text x="540" y="643" text-anchor="middle" class="name">Blackhole P150 · 120 Tensix cores · NoC · per-core L1 · GDDR6</text>
</svg>
